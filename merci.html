<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maths 3ème - Corrigés d'Exercices</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        header { text-align: center; padding: 30px 10px; background: #ffffff; border-bottom: 3px solid #007bff; margin-bottom: 30px; }
        h1 { color: #007bff; font-size: 24px; margin-bottom: 5px; }
        .section-chapitre { max-width: 900px; margin: 0 auto 40px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .titre-chapitre { border-left: 5px solid #ff9800; padding-left: 15px; color: #2c3e50; font-size: 20px; margin-bottom: 20px; }
        .grille-exercices { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .carte-exercice { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 6px; padding: 20px; width: 100%; max-width: 320px; box-sizing: border-box; }
        .carte-exercice h3 { margin-top: 0; color: #333; font-size: 16px; margin-bottom: 15px; }
        .message-securite { font-size: 12px; color: #555; text-align: center; margin-top: 15px; font-style: italic; }
        
        /* LE BOUTON BLEU D'ACHAT DIRECT */
        .bouton-acheter-bleu {
            display: block;
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            text-decoration: none; /* Enlève le soulignement du lien */
            box-sizing: border-box;
            transition: background-color 0.2s;
        }
        .bouton-acheter-bleu:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <header>
        <h1> Merci de cliquer sur le bouton de téléchargement ci-dessous</h1>
        <p>Corrigés détaillés des exercices pour réviser le Brevet</p>
    </header>

    <main>
        <section class="section-chapitre">
            <h2 class="titre-chapitre">Corrigé du td sur les racines carrées</h2>
            
            <div class="grille-exercices">
                
                <article class="carte-exercice">
                    <h3> veuillez cliquer sur le bouton de téléchargement ci-dessous</h3>
                    
                    <!-- SANS TARGET="_BLANK" : LE PAIEMENT S'OUVRE SANS POP-UP DANS LE MÊME ONGLET -->
                    <a href="https://drive.google.com/file/d/133qYMwip_AR09SToYCOImVGzRx5LsVrB/view?usp=drivesdk" class="bouton-acheter-bleu"> bouton de téléchargement </a>

                    <p class="message-securite">Paiement 100% sécurisé via PayPal</p>
                </article>

            </div>
        </section>
    </main>

</body>
</html>
